# Podman-only override, layered on top of docker-compose.yml automatically by
# the Makefile when Podman is detected (see COMPOSE in Makefile).
#
# Rootless Podman remaps container UIDs through user namespaces: UID 0 (root)
# is auto-mapped to the invoking host user, but non-root UIDs (e.g. the "node"/
# "app" users the frontend/backend/auth Dockerfiles run as, uid 1000) get
# mapped to an arbitrary subordinate UID range from /etc/subuid instead -
# unrelated to who owns the bind-mounted project directory on the host. That
# causes permission denied errors (e.g. "mkdir /app/tmp: permission denied")
# even though the same non-root setup works fine on Docker.
#
# userns_mode: keep-id maps the invoking host user's UID to the *same numeric*
# UID inside the container by default. That's only uid 1000 by coincidence on
# some machines - on a shared/school Linux account the host UID can be
# something like 44528639, which still won't line up with the "node"/"app"
# user's hardcoded uid 1000, so the permission error persists even with
# plain keep-id.
# keep-id:uid=1000,gid=1000 tells Podman to remap the invoking host user to
# uid/gid 1000 specifically inside the container, regardless of their real
# host UID, so it always matches the "node"/"app" user these Dockerfiles use.
# This is a Podman-specific value that plain Docker Compose does not
# understand, which is why it lives in this separate override file instead of
# docker-compose.yml.
services:
  frontend:
    userns_mode: keep-id:uid=1000,gid=1000

  backend:
    userns_mode: keep-id:uid=1000,gid=1000

  auth:
    userns_mode: keep-id:uid=1000,gid=1000
