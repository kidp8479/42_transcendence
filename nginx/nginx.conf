events {}

http {
    server {
        listen 8080;

        # Frontend (dev) - proxies to Vite which handles deep links natively.
        # In prod, replace this block with:
        #   root /usr/share/nginx/html;
        #   try_files $uri /index.html;
        # try_files ensures deep links (/dashboard, /project/123) always serve index.html
        # so TanStack Router can handle the routing client-side instead of nginx returning a 404.
        location / {
            proxy_pass http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Backend API
        location /api {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket
        location /ws {
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # Auth service
        location = /auth/internal {
            return 404;
        }

        location ^~ /auth/internal/ {
            return 404;
        }

        location /auth {
            proxy_pass http://auth:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
