services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - auth
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_WS_URL=${VITE_WS_URL}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL}
      - AUTH_INTERNAL_TOKEN=${AUTH_INTERNAL_TOKEN}
      - AUTH_SESSION_COOKIE=${AUTH_SESSION_COOKIE}
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      auth:
        condition: service_healthy
    restart: unless-stopped

  auth:
    build:
      context: ./auth
      target: dev
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_ORIGIN=${APP_ORIGIN}
      - AUTH_INTERNAL_TOKEN=${AUTH_INTERNAL_TOKEN}
      - AUTH_SESSION_COOKIE=${AUTH_SESSION_COOKIE}
      - AUTH_CSRF_COOKIE=${AUTH_CSRF_COOKIE}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE}
      - AUTH_SESSION_IDLE_TIMEOUT=${AUTH_SESSION_IDLE_TIMEOUT}
      - AUTH_SESSION_ABSOLUTE_TIMEOUT=${AUTH_SESSION_ABSOLUTE_TIMEOUT}
      - OAUTH_42_CLIENT_ID=${OAUTH_42_CLIENT_ID}
      - OAUTH_42_CLIENT_SECRET=${OAUTH_42_CLIENT_SECRET}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET}
      - TOTP_ISSUER=${TOTP_ISSUER}
    volumes:
      - ./auth:/app
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3001/auth/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  db_data:
  frontend_node_modules:
  backend_node_modules:
